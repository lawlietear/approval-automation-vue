<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Approval Tool</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0f0f0f; }
      #app { height: 100%; }

      #loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #0f0f0f;
        z-index: 9999; transition: opacity 0.5s ease;
      }

      /* 脉冲光晕 */
      #loader .aura {
        position: absolute; width: 160px; height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
        animation: aura-pulse 2s ease-in-out infinite;
      }
      @keyframes aura-pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.6; }
        50% { transform: scale(1.3); opacity: 1; }
      }

      /* 双层反向旋转圆环 */
      #loader .ring-box {
        position: relative; width: 80px; height: 80px;
      }
      #loader .ring {
        position: absolute; inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
      }
      #loader .ring-1 {
        border-top-color: #f97316;
        border-right-color: rgba(249,115,22,0.3);
        animation: spin 1.2s linear infinite;
      }
      #loader .ring-2 {
        inset: 10px;
        border-bottom-color: #fb923c;
        border-left-color: rgba(251,146,60,0.3);
        animation: spin-reverse 1.8s linear infinite;
      }
      #loader .ring-3 {
        inset: 20px;
        border-top-color: #fdba74;
        border-right-color: rgba(253,186,116,0.3);
        animation: spin 2.4s linear infinite;
      }

      /* 中心发光点 */
      #loader .core {
        position: absolute; top: 50%; left: 50%;
        width: 12px; height: 12px; margin: -6px 0 0 -6px;
        border-radius: 50%;
        background: #f97316;
        box-shadow: 0 0 20px #f97316, 0 0 40px rgba(249,115,22,0.4);
        animation: core-blink 1.5s ease-in-out infinite;
      }
      @keyframes core-blink {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.7); opacity: 0.6; }
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spin-reverse { to { transform: rotate(-360deg); } }

      /* 文字 */
      #loader .brand {
        margin-top: 32px; font-family: system-ui, sans-serif;
        font-size: 18px; font-weight: 700; letter-spacing: 0.15em;
        background: linear-gradient(90deg, #f97316, #fdba74, #f97316);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: text-shine 2.5s linear infinite;
      }
      @keyframes text-shine {
        to { background-position: 200% center; }
      }
      #loader .sub {
        margin-top: 8px; font-family: system-ui, sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.2em;
      }

      #loader.hide { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="aura"></div>
      <div class="ring-box">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="core"></div>
      </div>
      <div class="brand">ApprovalTool</div>
      <div class="sub">LOADING...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
